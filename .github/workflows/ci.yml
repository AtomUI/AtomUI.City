name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AtomUICity.slnx

      - name: Build
        run: dotnet build AtomUICity.slnx --no-restore

      - name: Public API
        run: bash eng/check-public-api.sh

      - name: Test
        run: bash eng/test-ci.sh

      - name: Format
        run: dotnet format AtomUICity.slnx --verify-no-changes --no-restore

      - name: License Headers
        run: bash eng/check-license.sh

      - name: Documentation
        run: bash eng/check-docs.sh

      - name: Release Notes
        run: bash eng/generate-release-notes.sh

      - name: Pack
        run: bash eng/pack.sh --no-build
